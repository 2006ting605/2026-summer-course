<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>60天財經生活素養 · 暑假課程</title>
<style>
  :root{
    --ink:#1A2530;
    --ink-soft:#4A5A66;
    --sand:#F7F3EC;
    --line:#D8D0C0;
    --gold:#C98A2C;
    --gold-soft:#F1D9A8;
    --teal:#2F6E5B;
    --navy-deep:#132530;
    --navy-mid:#1B3A46;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--sand);
    color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.75;
  }
  h1,h2,h3{
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    font-weight:700;
    letter-spacing:0.02em;
  }

  /* ---------- HERO ---------- */
  .hero{
    background:linear-gradient(180deg,var(--navy-deep) 0%,var(--navy-mid) 100%);
    color:#fff;
    padding:8vh 6vw 7vh;
    text-align:center;
  }
  .eyebrow{
    font-size:0.75rem;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--gold-soft);
    font-weight:600;
  }
  .hero h1{
    font-size:clamp(2.2rem,6vw,3.6rem);
    color:#fff;
    margin:0.7rem 0 0.6rem;
  }
  .hero p{
    max-width:560px;
    margin:0 auto;
    color:#CBD9DD;
    font-size:1.02rem;
  }

  /* progress bar */
  .progress-wrap{
    max-width:420px;
    margin:2.4rem auto 0;
  }
  .progress-label{
    display:flex;
    justify-content:space-between;
    font-size:0.85rem;
    color:#B9C7CC;
    margin-bottom:0.5rem;
  }
  .progress-track{
    height:8px;
    border-radius:99px;
    background:rgba(255,255,255,0.12);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--gold),var(--gold-soft));
    border-radius:99px;
  }

  .cta-btn{
    display:inline-block;
    margin-top:2.2rem;
    background:var(--gold);
    color:#1A2530;
    font-weight:700;
    text-decoration:none;
    padding:0.85rem 2rem;
    border-radius:6px;
    font-size:1rem;
    transition:transform 0.2s ease, background 0.2s ease;
  }
  .cta-btn:hover{
    background:var(--gold-soft);
    transform:translateY(-2px);
  }

  /* ---------- MAP SECTION ---------- */
  .map-section{
    padding:5.5rem 6vw 6rem;
    max-width:1180px;
    margin:0 auto;
  }
  .map-header{
    text-align:center;
    max-width:640px;
    margin:0 auto 3rem;
  }
  .map-header .eyebrow{color:var(--teal);}
  .map-header h2{
    font-size:clamp(1.6rem,3.5vw,2.1rem);
    color:var(--ink);
    margin:0.6rem 0 0.8rem;
  }
  .map-header p{color:var(--ink-soft);font-size:0.98rem;}

  .day-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(108px,1fr));
    gap:0.7rem;
  }

  /* flip card structure, styled like the original v1 tiles */
  .day-tile-wrap{
    aspect-ratio:1/1;
    perspective:900px;
  }
  .day-tile-inner{
    position:relative;
    width:100%;height:100%;
    transform-style:preserve-3d;
    transition:transform 0.55s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .day-tile-inner.flipped{transform:rotateY(180deg);}

  .tile-face{
    position:absolute;inset:0;
    backface-visibility:hidden;
    border-radius:8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0.4rem;
  }
  .tile-back{transform:rotateY(180deg);}

  .day-tile-wrap.locked .tile-front{
    border:1.5px dashed var(--line);
    color:#B9B0A0;
  }
  .day-tile-wrap.locked .tile-front .num{
    font-family:"Noto Serif TC",serif;
    font-size:1.1rem;
    font-weight:700;
    color:#C7BEAE;
  }
  .day-tile-wrap.locked .tile-back{
    border:1.5px dashed var(--line);
    color:var(--ink-soft);
    font-size:0.68rem;
    background:#FBF9F3;
  }

  .day-tile-wrap.done .tile-front{
    background:#fff;
    border:1.5px solid var(--gold);
    box-shadow:0 4px 14px rgba(201,138,44,0.18);
  }
  .day-tile-wrap.done:hover .tile-front{
    box-shadow:0 8px 20px rgba(201,138,44,0.28);
  }
  .day-tile-wrap.done .tile-front .num{
    font-family:"Noto Serif TC",serif;
    font-size:1.1rem;
    font-weight:700;
    color:var(--gold);
  }
  .day-tile-wrap.done .tile-front .tag{
    font-size:0.62rem;
    color:var(--teal);
    font-weight:700;
    margin-top:0.15rem;
  }
  .day-tile-wrap.done .tile-back{
    background:var(--gold);
    border:1.5px solid var(--gold);
    color:#fff;
  }
  .day-tile-wrap.done .tile-back .ttl{
    font-size:0.66rem;
    line-height:1.3;
    margin-bottom:0.35rem;
  }
  .day-tile-wrap.done .tile-back .go{
    font-size:0.6rem;
    opacity:0.9;
  }

  /* legend */
  .legend{
    display:flex;
    justify-content:center;
    gap:2rem;
    margin-top:2.5rem;
    font-size:0.85rem;
    color:var(--ink-soft);
  }
  .legend span{display:flex;align-items:center;gap:0.5rem;}
  .dot{width:12px;height:12px;border-radius:3px;display:inline-block;}
  .dot.done{background:var(--gold);}
  .dot.locked{border:1.5px dashed var(--line);}

  footer{
    text-align:center;
    padding:2.4rem;
    font-size:0.8rem;
    color:var(--ink-soft);
    border-top:1px solid var(--line);
  }

  @media(max-width:600px){
    .day-grid{grid-template-columns:repeat(auto-fill,minmax(84px,1fr));}
  }
</style>
</head>
<body>

<div class="hero">
  <div class="eyebrow">Summer 2026</div>
  <h1>60天財經生活素養</h1>
  <p>每天一個 20–30 分鐘的小主題，從天氣現象、投資觀念到生活理財，陪你用日常視角認識世界的運作方式。</p>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">Day 1 / 60</span>
      <span id="progress-pct">2%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:2%;"></div>
    </div>
  </div>

  <a class="cta-btn" href="day1-el-nino.html">開始 Day 1 →</a>
</div>

<section class="map-section">
  <div class="map-header">
    <div class="eyebrow">學習地圖</div>
    <h2>60天的旅程，一天一格</h2>
    <p>點金色格子會先翻面顯示當天內容，再帶你進去閱讀；虛線格子是還沒上線的天數，敬請期待。</p>
  </div>

  <div class="day-grid" id="day-grid"></div>

  <div class="legend">
    <span><i class="dot done"></i> 已上線，點我翻面</span>
    <span><i class="dot locked"></i> 尚未上線</span>
  </div>
</section>

<footer>60天財金生活小知識課程 · 由 Claude 協助製作</footer>

<script>
  // ------------------------------------------------------------
  // 之後新增每一天的內容，只要在這個陣列裡「新增一行」就好，
  // 不需要更動下面的任何 HTML／CSS，網格會自動更新。
  // ------------------------------------------------------------
  const TOTAL_DAYS = 60;
  const days = [
    { day: 1, title: "聖嬰現象 El Niño", file: "day1-el-nino.html", tag: "氣候常識" },
    // { day: 2, title: "颱風分級標準", file: "day2-typhoon.html", tag: "氣候常識" },
    { day: 3, title: "從漢江奇蹟到N拋世代", file: "day3-korea-generations.html", tag: "社會觀察" }
  ];

  const dayMap = {};
  days.forEach(d => dayMap[d.day] = d);

  const grid = document.getElementById('day-grid');
  let html = '';
  for(let i = 1; i <= TOTAL_DAYS; i++){
    const d = dayMap[i];
    if(d){
      html += `
        <div class="day-tile-wrap done" data-day="${i}" onclick="flipDone(event,this,'${d.file}')">
          <div class="day-tile-inner">
            <div class="tile-face tile-front">
              <div class="num">Day ${d.day}</div>
              <div class="tag">${d.tag || ''}</div>
            </div>
            <div class="tile-face tile-back">
              <div class="ttl">${d.title}</div>
              <div class="go">前往閱讀 →</div>
            </div>
          </div>
        </div>`;
    } else {
      html += `
        <div class="day-tile-wrap locked" data-day="${i}" onclick="flipLocked(event,this,${i})">
          <div class="day-tile-inner">
            <div class="tile-face tile-front">
              <div class="num">${i}</div>
            </div>
            <div class="tile-face tile-back">
              Day ${i}<br>尚未上線
            </div>
          </div>
        </div>`;
    }
  }
  grid.innerHTML = html;

  function flipDone(e, wrap, href){
    const inner = wrap.querySelector('.day-tile-inner');
    if(inner.classList.contains('flipped')) return;
    inner.classList.add('flipped');
    setTimeout(() => { window.location.href = href; }, 750);
  }

  function flipLocked(e, wrap, dayNum){
    const inner = wrap.querySelector('.day-tile-inner');
    if(inner.classList.contains('flipped')) return;
    inner.classList.add('flipped');
    setTimeout(() => { inner.classList.remove('flipped'); }, 1300);
  }

  // progress bar
  const doneCount = days.length;
  const pct = Math.round((doneCount / TOTAL_DAYS) * 100);
  document.getElementById('progress-text').textContent = `Day ${doneCount} / ${TOTAL_DAYS}`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
</script>

</body>
</html>
